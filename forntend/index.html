<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rutas Seguras Kids</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ========== CONTENEDOR PRINCIPAL ========== -->
  <div class="contenedor">

    <!-- ========== HEADER ========== -->
    <div class="header">
      <div class="logo">
        <h1>🚌 Rutas Seguras <span>Kids</span></h1>
      </div>
      <div class="clima" id="clima">
        <span>Cargando clima...</span>
      </div>
    </div>

    <!-- ========== FORMULARIOS ========== -->
    <div class="formularios">

      <!-- FORMULARIO 1: Gestionar Ruta -->
      <div class="tarjeta">
        <h2>📋 Gestionar Ruta</h2>
        <form id="formRuta">

          <div id="contenedor-input-ruta" class="campo">
            <label>Nombre de la ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: Ruta Norte">

          </div>

          <div id="contenedor-input-conductor" class="campo">
            <label>Conductor:</label>
            <input type="text" id="conductor" placeholder="Ej: Juan Pérez">
          </div>

          <div id="contenedor-hora-salida" class="campo">
            <label>Hora de salida:</label>
            <input type="time" id="horaSalida">
          </div>

          <div class="grupo-botones">
            <button type="submit" class="btn-guardar">💾 Guardar Ruta</button>
            <button type="button" id="cancelarBtn" style="display: none;">Cancelar Edición</button>
          </div>
        </form>
      </div>

      <!-- FORMULARIO 2: Asignar Estudiante -->
      <div class="tarjeta">
        <h2>👨‍🎓 Asignar Estudiante</h2>
        <form id="formEstudiante">
          <div class="campo">
            <label>Nombre del estudiante:</label>
            <input type="text" id="nombreEstudiante" placeholder="Ej: María López">
          </div>

          <div class="campo">
            <label>Seleccionar ruta:</label>
            <select id="selectRuta">
              <option value="">-- Selecciona una ruta --</option>
            </select>
          </div>

          <button type="submit" class="btn-asignar">➕ Asignar Estudiante</button>
        </form>
      </div>
    </div>

    <!-- ========== LISTA DE RUTAS ========== -->
    <div class="seccion-rutas">
      <h2>🚍 Mis Rutas</h2>

      <div id="contenedorRutas" class="lista-rutas">
        <div class="mensaje-vacio"> No hay rutas.</div>

      </div>
    </div>

    <!-- ========== ESTADÍSTICAS ========== -->
    <div class="estadisticas">
      <div class="caja-estadistica">
        <div class="numero" id="totalRutas">0</div>
        <div class="texto">Total Rutas</div>
      </div>
      <div class="caja-estadistica">
        <div class="numero" id="totalEstudiantes">0</div>
        <div class="texto">Estudiantes</div>
      </div>
      <div class="caja-estadistica">
        <div class="numero" id="promedioRuta">0</div>
        <div class="texto">Promedio por Ruta</div>
      </div>
    </div>

  </div>

  <!-- Modal para editar ruta -->
  <div id="modalEditarRuta" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>✏️ Editar Ruta</h2>
        <span class="modal-close">&times;</span>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modalEditandoId">

        <div class="modal-field">
          <label>Nombre de la ruta:</label>
          <input type="text" id="modalNombreRuta" placeholder="Ej: Ruta Norte">
        </div>

        <div class="modal-field">
          <label>Conductor:</label>
          <input type="text" id="modalConductor" placeholder="Ej: Juan Pérez">
        </div>

        <div class="modal-field">
          <label>Hora de salida:</label>
          <input type="time" id="modalHoraSalida">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancelar" id="modalCancelarBtn">Cancelar</button>
        <button type="button" class="btn-guardar" id="modalGuardarBtn">Guardar Cambios</button>
      </div>
    </div>
  </div>

  <script src="/javaScript/app.js"></script>
</body>

</html>
